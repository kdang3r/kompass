  [['newest','Newest first'], ['oldest','Oldest first'], ['most-oor','Most out-of-range'], ['by-metric','By first metric value']].forEach(([v,l]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = l;
    if (s.sort === v) o.selected = true; sortSel.appendChild(o);
  });
  sortSel.onchange = () => { s.sort = sortSel.value; renderListViewSwap(main); };
  sortCard.appendChild(sortSel);
  main.appendChild(sortCard);

  // Build results
  const { from, to } = rangeDates(s.range, s.customFrom, s.customTo);
  const allRows = buildListRows(s.metrics, from, to);
  let filtered = allRows;
  if (s.show === 'in-range') filtered = filtered.filter(r => r.hasOutOfRange === false && r.anyLogged);
  else if (s.show === 'out-of-range') filtered = filtered.filter(r => r.hasOutOfRange);
  else if (s.show === 'custom' && s.customSelectedDates) filtered = filtered.filter(r => s.customSelectedDates.includes(r.date));
  // Sort
  if (s.sort === 'newest') filtered.sort((a,b) => b.date.localeCompare(a.date));
  else if (s.sort === 'oldest') filtered.sort((a,b) => a.date.localeCompare(b.date));
  else if (s.sort === 'most-oor') filtered.sort((a,b) => b.outOfRangeCount - a.outOfRangeCount);
  else if (s.sort === 'by-metric' && s.metrics.length) {
    filtered.sort((a,b) => (b.values[s.metrics[0]] ?? -Infinity) - (a.values[s.metrics[0]] ?? -Infinity));
  }

  const resCard = document.createElement('div'); resCard.className = 'card';
  resCard.innerHTML = `<div class="card__title">Results (${filtered.length})</div>`;
  if (s.metrics.length === 0) {
    resCard.innerHTML += `<p style="color:var(--text-muted); font-size:13px;">Pick at least one metric to see results.</p>`;
  } else if (filtered.length === 0) {
    resCard.innerHTML += `<p style="color:var(--text-muted); font-size:13px;">No matching entries.</p>`;
  } else {
    const tbl = document.createElement('table'); tbl.className = 'data-table';
    let head = '<thead><tr><th>Date</th>';
    s.metrics.forEach(mid => { head += `<th>${metricMeta(mid).label}</th>`; });
    head += '</tr></thead>';
    tbl.innerHTML = head;
    const tbody = document.createElement('tbody');
    filtered.forEach(row => {
      const tr = document.createElement('tr'); tr.className = 'row-clickable';
      let cells = `<td>${shortDate(row.date)}</td>`;
      s.metrics.forEach(mid => {
        const v = row.values[mid];
        const ynM = isYNMetric(mid);
        const display = v === null || v === undefined ? '—' : (ynM ? (v ? 'Yes' : 'No') : formatMetric(v, mid));
        const oor = isOutOfRange(v, mid);
        const cls = oor ? 'out-of-range' : (v !== null && v !== undefined ? 'in-range' : '');
        cells += `<td class="${cls}">${display}</td>`;
      });
      tr.innerHTML = cells;
      tr.onclick = () => { s.expanded[row.date] = !s.expanded[row.date]; renderListViewSwap(main); };
      tbody.appendChild(tr);
      if (s.expanded[row.date]) {
        const exp = document.createElement('tr'); exp.className = 'expanded-row';
        const td = document.createElement('td'); td.colSpan = s.metrics.length + 1;
        let html = '';
        s.metrics.forEach(mid => {
          const v = row.values[mid];
          const range = state.settings.normalRanges[mid];
          if (isOutOfRange(v, mid) && range) {
            html += `<div class="expansion-detail bad">${metricMeta(mid).label} outside normal range (${range.min || 'any'} – ${range.max || 'any'})</div>`;
          } else if (v !== null && v !== undefined && range) {
            html += `<div class="expansion-detail">${metricMeta(mid).label} within normal range</div>`;
          }
        });
        const openBtn = document.createElement('button');
        openBtn.className = 'btn btn--small btn--secondary'; openBtn.textContent = 'Open full log →';
        openBtn.onclick = (e) => { e.stopPropagation(); openLogModal(row.date); };
        td.innerHTML = html;
        td.appendChild(openBtn);
        exp.appendChild(td); tbody.appendChild(exp);
      }
    });
    tbl.appendChild(tbody);
    resCard.appendChild(tbl);
  }
  main.appendChild(resCard);

  // Actions
  const actions = document.createElement('div'); actions.className = 'action-row';
  const dlBtn = document.createElement('button'); dlBtn.className = 'btn'; dlBtn.textContent = 'Download PDF';
  dlBtn.onclick = () => downloadListPDF(s, filtered);
  const expBtn = document.createElement('button'); expBtn.className = 'btn btn--secondary'; expBtn.textContent = '+ Add to Export Folder';
  expBtn.onclick = () => {
    state.exportFolder.push({
      id: 'ef-' + Date.now(), kind: 'list',
      title: `List: ${s.metrics.map(m=>metricMeta(m).label).join(', ')} (${s.show}, ${s.range})`,
      config: JSON.parse(JSON.stringify(s)),
      note: '',
    });
    queuePush(); updateExportBadge();
    toast(`Added to Export Folder (${state.exportFolder.length})`);
  };
  const saveBtn = document.createElement('button'); saveBtn.className = 'btn btn--secondary'; saveBtn.textContent = 'Save filter';
  saveBtn.onclick = () => {
    modal({
      title: 'Save this filter',
      body: `<label style="font-size:13px;">Name:</label>
        <input type="text" id="filtName" class="text-input" value="${escapeHtml(`${s.metrics.map(m=>metricMeta(m).label).join(' + ')} · ${s.show}`)}"/>`,
      actions: [
        { label: 'Cancel' },
        { label: 'Save', primary: true, onClick: () => {
          state.savedListFilters.push({ id: 'flt-' + Date.now(), name: document.querySelector('#filtName').value, config: JSON.parse(JSON.stringify(s)) });
          queuePush(); toast('Filter saved');
        }},
      ],
    });
  };
  actions.appendChild(dlBtn); actions.appendChild(expBtn); actions.appendChild(saveBtn);
  main.appendChild(actions);
}

function renderListViewSwap(main) { renderListView(main); }

function buildListRows(metricIds, from, to) {
  const rows = [];
  const d = new Date(from);
  while (d <= to) {
    const key = ymd(d);
    const log = state.logs[key];
    const values = {};
    let anyLogged = false;
    let hasOutOfRange = false;
    let outOfRangeCount = 0;
    metricIds.forEach(mid => {
      const v = log && !log.archived && !log.deleted ? extractMetric(log, mid) : null;
      values[mid] = v;
      if (v !== null && v !== undefined) anyLogged = true;
      if (isOutOfRange(v, mid)) { hasOutOfRange = true; outOfRangeCount++; }
    });
    rows.push({ date: key, values, anyLogged, hasOutOfRange, outOfRangeCount });
    d.setDate(d.getDate() + 1);
  }
  return rows.filter(r => r.anyLogged);
}

function openCustomFilterModal(s, onDone) {
  const { from, to } = rangeDates(s.range, s.customFrom, s.customTo);
  const allRows = buildListRows(s.metrics, from, to);
  // Pre-check by current filter
  let preChecked = new Set();
  if (s.customSelectedDates) preChecked = new Set(s.customSelectedDates);
  else if (s.show === 'out-of-range') allRows.filter(r => r.hasOutOfRange).forEach(r => preChecked.add(r.date));
  else if (s.show === 'in-range') allRows.filter(r => !r.hasOutOfRange).forEach(r => preChecked.add(r.date));
  else allRows.forEach(r => preChecked.add(r.date));

  let html = '<p style="font-size:12px; color:var(--text-dim); margin-bottom:10px;">Uncheck to remove. Check more to add.</p><div style="max-height:300px; overflow-y:auto;">';
  allRows.forEach(r => {
    const label = `${shortDate(r.date)} · ` + s.metrics.map(mid => {
      const v = r.values[mid];
      const ynM = isYNMetric(mid);
      return `${metricMeta(mid).label}: ${v === null ? '—' : ynM ? (v ? 'Yes' : 'No') : formatMetric(v, mid)}`;
    }).join(' · ');
    html += `<label style="display:block; padding:6px 0; font-size:13px;"><input type="checkbox" data-date="${r.date}" ${preChecked.has(r.date) ? 'checked' : ''}/> ${escapeHtml(label)}</label>`;
  });
  html += '</div>';
  modal({
    title: 'Refine selection',
    body: html,
    actions: [
      { label: 'Cancel' },
      { label: 'Apply', primary: true, onClick: () => {
        const sel = [...document.querySelectorAll('input[data-date]:checked')].map(el => el.dataset.date);
        s.show = 'custom';
        s.customSelectedDates = sel;
        onDone();
      }},
    ],
  });
}

function cloneAndUpdateSnapshot(item) {
  const cloned = { ...item.config };
  const { from, to } = rangeDates(cloned.range, cloned.customFrom, cloned.customTo);
  const frozen = {};
  (cloned.metrics || []).forEach(mid => { frozen[mid] = getSeries(mid, from, to); });
  state.savedSnapshots.push({
    id: 'snap-' + Date.now(),
    name: item.name + ' (updated ' + shortDate(ymd(new Date())) + ')',
    savedAt: new Date().toISOString(),
    config: JSON.parse(JSON.stringify(cloned)),
    frozenData: frozen,
  });
  queuePush(); toast('Cloned + updated snapshot');
  renderSavedReportsSwap($('#main'));
}

// ============= PDF GENERATION =============
async function captureCanvas(canvas) {
  return canvas.toDataURL('image/png');
}

async function renderChartToOffscreen(metricIds, seriesList, chartType, width=800, height=400) {
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  c.style.cssText = 'position:fixed; top:-9999px; left:-9999px;';
  document.body.appendChild(c);
  // Draw chart
  const labels = seriesList[0].map(p => p.date.slice(5));
  const colors = ['#607d6e', '#b87291', '#c48b5f'];
  const datasets = metricIds.map((mid, idx) => ({
    type: chartType === 'bar' ? 'bar' : 'line',
    label: metricMeta(mid).label,
    yAxisID: idx === 0 ? 'y' : 'y1',
    data: seriesList[idx].map(p => p.value),
    borderColor: colors[idx], backgroundColor: colors[idx] + '88',
    borderWidth: 2, pointRadius: 2, tension: 0.25,
  }));
  const scales = { y: { beginAtZero: false } };
  if (metricIds.length > 1) scales.y1 = { position: 'right', beginAtZero: false, grid: { drawOnChartArea: false } };
  const ch = new Chart(c, {
    type: datasets[0]?.type || 'line',
    data: { labels, datasets },
    options: { responsive: false, animation: false, plugins: { legend: { display: true } }, scales },
  });
  await new Promise(r => setTimeout(r, 100));
  const dataUrl = c.toDataURL('image/png');
  ch.destroy();
  document.body.removeChild(c);
  return dataUrl;
}

async function downloadQuickViewPDF(metricId, series, stats, rangeId, from, to) {
  toast('Generating PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const meta = metricMeta(metricId);
  doc.setFontSize(16); doc.text(`${meta.label} — Quick View`, 40, 50);
  doc.setFontSize(10); doc.setTextColor(100);
  doc.text(`Range: ${rangeId} (${shortDate(ymd(from))} – ${shortDate(ymd(to))})`, 40, 70);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 40, 85);
  doc.setTextColor(0);
  const img = await renderChartToOffscreen([metricId], [series], meta.chart === 'bar' ? 'bar' : 'line', 1100, 500);
  doc.addImage(img, 'PNG', 40, 100, 520, 240);
  // Stats
  doc.setFontSize(12); doc.text('Summary', 40, 380);
  doc.setFontSize(10);
  const lines = [
    ['Average', stats.avg], ['Median', stats.median],
    ['Best', `${stats.best}${stats.bestDate ? ' (' + stats.bestDate + ')' : ''}`],
    ['Worst', `${stats.worst}${stats.worstDate ? ' (' + stats.worstDate + ')' : ''}`],
    ['In-range', stats.inRange], ['Out-of-range', stats.outOfRange],
    ['Logged', stats.logged],
  ];
  let y = 400;
  lines.forEach(([k, v]) => { doc.text(`${k}: ${v}`, 40, y); y += 16; });
  doc.save(`kompass-${meta.id}-${rangeId}.pdf`);
  toast('PDF downloaded');
}

async function downloadChartPDF(s) {
  if (s.metrics.length === 0) { toast('Add a metric first'); return; }
  toast('Generating PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const { from, to } = rangeDates(s.range, s.customFrom, s.customTo);
  const seriesList = s.metrics.map(mid => getSeries(mid, from, to));
  doc.setFontSize(16); doc.text(s.title || autoChartName(s), 40, 50);
  doc.setFontSize(10); doc.setTextColor(100);
  doc.text(`Range: ${s.range} (${shortDate(ymd(from))} – ${shortDate(ymd(to))})`, 40, 70);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 40, 85);
  doc.setTextColor(0);
  const img = await renderChartToOffscreen(s.metrics, seriesList, s.chartType, 1100, 500);
  doc.addImage(img, 'PNG', 40, 100, 520, 240);
  // Stats per metric
  let y = 380;
  doc.setFontSize(12); doc.text('Summary', 40, y); y += 18;
  doc.setFontSize(10);
  s.metrics.forEach((mid, i) => {
    const stats = computeStats(seriesList[i], mid);
    doc.setFont(undefined,'bold'); doc.text(metricMeta(mid).label, 40, y); y += 14;
    doc.setFont(undefined,'normal');
    doc.text(`Avg: ${stats.avg}  ·  Median: ${stats.median}  ·  Best: ${stats.best}  ·  Worst: ${stats.worst}`, 40, y); y += 12;
    doc.text(`In-range: ${stats.inRange}  ·  Out-of-range: ${stats.outOfRange}  ·  Logged: ${stats.logged}`, 40, y); y += 18;
  });
  // Annotations
  if (s.advanced && s.advanced.annotations && s.advanced.annotations.length) {
    doc.setFontSize(12); doc.text('Annotations', 40, y); y += 16;
    doc.setFontSize(10);
    s.advanced.annotations.forEach(a => { doc.text(`${a.date}: ${a.text}`, 40, y); y += 12; });
  }
  doc.save(`kompass-${(s.title || 'chart').replace(/[^a-z0-9]/gi,'_')}.pdf`);
  toast('PDF downloaded');
}

async function downloadListPDF(s, rows) {
  toast('Generating PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  doc.setFontSize(16); doc.text(`List View — ${s.show}`, 40, 50);
  doc.setFontSize(10); doc.setTextColor(100);
  const { from, to } = rangeDates(s.range, s.customFrom, s.customTo);
  doc.text(`Range: ${s.range} (${shortDate(ymd(from))} – ${shortDate(ymd(to))})`, 40, 70);
  doc.text(`Metrics: ${s.metrics.map(m => metricMeta(m).label).join(', ')}`, 40, 85);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 40, 100);
  doc.setTextColor(0);
  // Table
  let y = 130;
  const colW = [80, ...s.metrics.map(_ => 70)];
  doc.setFont(undefined,'bold'); doc.text('Date', 40, y);
  let x = 40 + colW[0];
  s.metrics.forEach((mid, i) => { doc.text(metricMeta(mid).label.slice(0, 12), x, y); x += colW[i+1]; });
  y += 14;
  doc.setFont(undefined,'normal');
  rows.forEach(r => {
    if (y > 740) { doc.addPage(); y = 50; }
    doc.text(shortDate(r.date), 40, y);
    let xx = 40 + colW[0];
    s.metrics.forEach((mid, i) => {
      const v = r.values[mid];
      const ynM = isYNMetric(mid);
      const display = v === null || v === undefined ? '—' : ynM ? (v ? 'Yes' : 'No') : String(formatMetric(v, mid));
      if (isOutOfRange(v, mid)) doc.setTextColor(184,107,107);
      doc.text(display, xx, y);
      doc.setTextColor(0);
      xx += colW[i+1];
    });
    y += 14;
  });
  doc.save(`kompass-list-${s.show}-${s.range}.pdf`);
  toast('PDF downloaded');
}

async function downloadCombinedPDF(items, layout) {
  if (items.length === 0) { toast('Folder is empty'); return; }
  toast('Generating combined PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  let y = 50;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (i > 0 && layout === 'one-per-page') { doc.addPage(); y = 50; }
    if (layout === 'fit-to-fill' && y > 600) { doc.addPage(); y = 50; }
    // Optional note
    if (item.note) {
      doc.setFontSize(10); doc.setFont(undefined, 'italic'); doc.setTextColor(100);
      const wrapped = doc.splitTextToSize(item.note, 500);
      doc.text(wrapped, 40, y); y += 14 * wrapped.length + 6;
      doc.setFont(undefined, 'normal'); doc.setTextColor(0);
    }
    doc.setFontSize(13); doc.text(`${i+1}. ${item.title}`, 40, y); y += 18;
    if (item.kind === 'quickview') {
      const { from, to } = rangeDates(item.config.range, item.config.customFrom, item.config.customTo);
      const series = getSeries(item.config.metric, from, to);
      const img = await renderChartToOffscreen([item.config.metric], [series], metricMeta(item.config.metric).chart === 'bar' ? 'bar' : 'line', 1100, 400);
      doc.addImage(img, 'PNG', 40, y, 520, 200); y += 215;
    } else if (item.kind === 'chart' || item.kind === 'template' || item.kind === 'snapshot') {
      let seriesList;
      if (item.frozenData) {
        seriesList = item.config.metrics.map(mid => item.frozenData[mid] || []);
      } else {
        const { from, to } = rangeDates(item.config.range, item.config.customFrom, item.config.customTo);
        seriesList = item.config.metrics.map(mid => getSeries(mid, from, to));
      }
      const img = await renderChartToOffscreen(item.config.metrics, seriesList, item.config.chartType || 'line', 1100, 400);
      doc.addImage(img, 'PNG', 40, y, 520, 200); y += 215;
    } else if (item.kind === 'list') {
      const { from, to } = rangeDates(item.config.range, item.config.customFrom, item.config.customTo);
      const rows = buildListRows(item.config.metrics, from, to);
      let filtered = rows;
      if (item.config.show === 'in-range') filtered = filtered.filter(r => !r.hasOutOfRange && r.anyLogged);
      else if (item.config.show === 'out-of-range') filtered = filtered.filter(r => r.hasOutOfRange);
      else if (item.config.show === 'custom' && item.config.customSelectedDates) filtered = filtered.filter(r => item.config.customSelectedDates.includes(r.date));
      doc.setFontSize(9);
      filtered.slice(0, 30).forEach(r => {
        if (y > 740) { doc.addPage(); y = 50; }
        const vals = item.config.metrics.map(mid => {
          const v = r.values[mid]; const ynM = isYNMetric(mid);
          return v === null || v === undefined ? '—' : ynM ? (v ? 'Y' : 'N') : String(formatMetric(v, mid));
        }).join('  ');
        doc.text(`${shortDate(r.date)}  ${vals}`, 40, y); y += 12;
      });
      y += 8;
    } else if (item.kind === 'pastlog') {
      // Past log full dump
      const log = state.logs[item.date];
      if (log) {
        doc.setFontSize(10);
        const fields = listLogFields(log);
        fields.forEach(([k, v]) => {
          if (y > 740) { doc.addPage(); y = 50; }
          doc.text(`${k}: ${v}`, 40, y); y += 12;
        });
        y += 8;
      }
    }
  }
  doc.save(`kompass-combined-${ymd(new Date())}.pdf`);
  toast('Combined PDF downloaded');
}

function listLogFields(log) {
  const d = log.data;
  const rows = [
    ['Bedtime', d.bedtime], ['Wake up', d.wakeUp], ['Sleep quality', d.sleepQuality],
    ['Meds time', d.medsTime], ['Weight', d.weight], ['Workday', d.workday],
    ['Workout', d.workout ? `Yes (${d.workoutType||''})` : d.workout===false?'No':''],
    ['Caffeine', d.caffeine ? `Yes (${d.caffeineCount})` : d.caffeine===false?'No':''],
    ['Walk', d.walk ? `Yes (${d.walkMinutes} min)` : d.walk===false?'No':''],
    ['Wash hair', d.washHair ? `Yes${d.k18 ? ' + K18' : ''}` : d.washHair===false?'No':''],
    ['Protein shake', d.proteinShake ? `Yes${d.collagen ? ' + collagen' : ''}` : d.proteinShake===false?'No':''],
    ['Food', `${d.food}${d.foodNotes ? ' — ' + d.foodNotes : ''}`],
    ['Alcohol', d.alcohol ? `Yes (${d.alcoholCount})` : d.alcohol===false?'No':''],
    ['CBD', d.cbd ? `Yes (${d.cbdTime})` : d.cbd===false?'No':''],
    ['TV', d.tv ? `Yes (${d.tvLocation} ${d.tvPosture}, ${d.tvHours}h)` : d.tv===false?'No':''],
    ['Palpitations', d.palpitations ? `Yes — ${d.palpitationsNotes}` : d.palpitations===false?'No':''],
    ['Mood', `${d.mood}${d.moodNotes ? ' — ' + d.moodNotes : ''}`],
    ['Stress', `${d.stress}${d.stressNotes ? ' — ' + d.stressNotes : ''}`],
    ['Phone', `${d.phoneHours||0}h ${d.phoneMinutes||0}m`],
  ];
  // User-defined custom fields
  customFields().forEach(f => {
    let v = d[f.id];
    if (f.type === 'yesno') v = v === true ? 'Yes' : (v === false ? 'No' : '');
    else if (f.type === 'scale10' && d[f.id + 'Notes']) v = `${v} — ${d[f.id + 'Notes']}`;
    rows.push([f.label, v]);
  });
  return rows.filter(([k,v]) => v !== '' && v !== null && v !== undefined);
}

// =============== EVENT WIRING ===============
$('#keypad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  handlePinKey(btn.dataset.key);
});
document.addEventListener('keydown', e => {
  if ($('#login').classList.contains('hidden')) return;
  if (/^[0-9]$/.test(e.key)) handlePinKey(e.key);
  else if (e.key === 'Backspace') handlePinKey('back');
});
$('#menuBtn').onclick = openDrawer;
$('#drawerOverlay').onclick = closeDrawer;
$('#drawer').addEventListener('click', e => {
  const btn = e.target.closest('.drawer__item'); if (!btn) return;
  go(btn.dataset.page);
});

// =============== BOOT ===============
loadLocal();
if (sessionStorage.getItem('kompass_unlocked') === '1') {
  showApp();
}

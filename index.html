<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f7f5f1" />
<title>Kompass</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='none' stroke='%23607d6e' stroke-width='4'/%3E%3Cpath d='M50 18 L56 50 L50 82 L44 50 Z' fill='%23607d6e'/%3E%3C/svg%3E" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f7f5f1;
    --surface: #ffffff;
    --surface-2: #f0ede7;
    --border: #e4dfd5;
    --text: #2a2a2a;
    --text-dim: #7a7a7a;
    --text-muted: #a0a0a0;
    --accent: #607d6e;
    --accent-soft: #d8e3dc;
    --accent-text: #3d5147;
    --warn: #c48b5f;
    --warn-soft: #f4e6d8;
    --bad: #b86b6b;
    --bad-soft: #f0dada;
    --cycle: #b87291;
    --cycle-soft: #f3dde7;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    overscroll-behavior-y: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* ===== Login ===== */
  .login {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .login.hidden { display: none; }
  .login__logo {
    width: 64px; height: 64px; margin-bottom: 16px;
  }
  .login__title { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin: 0 0 4px; }
  .login__subtitle { font-size: 14px; color: var(--text-dim); margin: 0 0 32px; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 28px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    transition: all 0.15s ease;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--bad); border-color: var(--bad); }
  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; width: 100%; max-width: 260px;
  }
  .keypad button {
    aspect-ratio: 1; font-size: 24px; font-weight: 400;
    background: var(--surface); border-radius: 50%;
    box-shadow: var(--shadow);
    transition: transform 0.08s ease, background 0.15s ease;
  }
  .keypad button:active { transform: scale(0.95); background: var(--surface-2); }
  .keypad button.fn { background: transparent; box-shadow: none; font-size: 14px; color: var(--text-dim); }
  .login__error { color: var(--bad); font-size: 13px; height: 20px; margin-top: 16px; }

  /* ===== App shell ===== */
  .app { display: none; min-height: 100%; }
  .app.visible { display: block; }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .menu-btn {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); box-shadow: var(--shadow);
  }
  .menu-btn span {
    display: block; width: 18px; height: 2px; background: var(--text);
    border-radius: 1px; position: relative;
  }
  .menu-btn span::before, .menu-btn span::after {
    content: ''; position: absolute; left: 0; width: 18px; height: 2px;
    background: var(--text); border-radius: 1px;
  }
  .menu-btn span::before { top: -6px; }
  .menu-btn span::after { top: 6px; }
  .header__title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin: 0; }
  .header__sync {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .header__sync::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .header__sync.syncing::before { background: var(--warn); }
  .header__sync.error::before { background: var(--bad); }

  /* ===== Drawer ===== */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
    background: var(--surface); z-index: 201;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    display: flex; flex-direction: column;
    box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  }
  .drawer.open { transform: translateX(0); }
  .drawer__header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .drawer__title { font-size: 22px; font-weight: 600; margin: 0 0 2px; letter-spacing: -0.3px; }
  .drawer__subtitle { font-size: 12px; color: var(--text-muted); margin: 0; }
  .drawer__nav { padding: 12px 0; flex: 1; }
  .drawer__item {
    display: block; width: 100%; text-align: left;
    padding: 12px 20px; font-size: 15px; color: var(--text);
    transition: background 0.12s;
  }
  .drawer__item:hover { background: var(--surface-2); }
  .drawer__item.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 500; }
  .drawer__footer {
    padding: 16px 20px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }

  /* ===== Main ===== */
  .main {
    max-width: 720px; margin: 0 auto; padding: 16px;
  }
  .page { display: none; }
  .page.active { display: block; }

  /* ===== Cards ===== */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 16px;
  }
  .card__title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim);
    margin: 0 0 14px;
  }
  .card__row { display: flex; align-items: center; justify-content: space-between; }

  /* ===== Section (Today's Log groups) ===== */
  .section {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section__head {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; background: var(--surface);
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .section.expanded .section__head { border-bottom-color: var(--border); }
  .section__title {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim);
    display: flex; align-items: center; gap: 10px;
  }
  .section__badge {
    background: var(--bad); color: white; font-size: 10px;
    padding: 2px 7px; border-radius: 10px; font-weight: 600;
    letter-spacing: 0.3px;
  }
  .section__caret {
    width: 10px; height: 10px; border-right: 2px solid var(--text-muted);
    border-bottom: 2px solid var(--text-muted);
    transform: rotate(45deg);
    transition: transform 0.2s;
  }
  .section.expanded .section__caret { transform: rotate(-135deg); }
  .section__body { padding: 8px 18px 18px; }
  .section.collapsed .section__body { display: none; }

  /* ===== Field rows ===== */
  .field {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .field:last-child { border-bottom: none; }
  .field__label {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .field__label-text { font-size: 15px; font-weight: 500; }
  .field__label-text .req {
    color: var(--bad); margin-left: 4px; font-weight: 600;
  }
  .field__value {
    font-size: 13px; color: var(--text-dim);
  }
  .field__sub {
    margin-top: 12px; padding: 12px; background: var(--surface-2);
    border-radius: var(--radius-sm);
  }
  .field__sub:empty { display: none; }
  .field__row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ===== Inputs ===== */
  .time-input {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 15px; width: auto;
  }
  .number-input {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 15px; width: 80px; text-align: center;
  }
  .text-input {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 15px; width: 100%;
  }
  textarea.text-input { min-height: 60px; resize: vertical; font-family: inherit; }

  /* ===== Toggle (y/n) ===== */
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    padding: 8px 18px; border: 1px solid var(--border);
    background: var(--surface); border-radius: 20px;
    font-size: 14px; color: var(--text-dim);
    transition: all 0.15s;
  }
  .toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .toggle-btn.active.no { background: var(--text-muted); border-color: var(--text-muted); }

  /* ===== Slider ===== */
  .slider-wrap {
    margin-top: 4px;
  }
  .slider-wrap .slider-row {
    display: flex; align-items: center; gap: 12px;
  }
  .slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; background: var(--border);
    border-radius: 3px; outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 3px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 3px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .slider-value {
    min-width: 28px; text-align: center; font-weight: 600;
    font-size: 18px; color: var(--accent-text);
  }
  .slider-scale {
    display: flex; justify-content: space-between;
    margin-top: 6px; font-size: 11px; color: var(--text-muted);
  }

  /* ===== Counter ===== */
  .counter {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border-radius: 20px;
    padding: 4px;
  }
  .counter button {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .counter button:active { background: var(--accent-soft); }
  .counter__value {
    min-width: 32px; text-align: center; font-weight: 600;
    font-size: 15px;
  }

  /* ===== Buttons ===== */
  .btn {
    padding: 12px 20px; border-radius: var(--radius-sm);
    background: var(--accent); color: white;
    font-size: 15px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn--secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn--full { width: 100%; }
  .btn--small { padding: 8px 14px; font-size: 13px; }
  .btn--ghost { background: transparent; color: var(--text-dim); }

  /* ===== Cycle pill ===== */
  .cycle-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 16px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 13px; color: var(--text-dim);
    margin-bottom: 16px;
  }
  .cycle-pill.active {
    background: var(--cycle-soft); color: var(--cycle); border-color: var(--cycle);
  }
  .cycle-pill::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted);
  }
  .cycle-pill.active::before { background: var(--cycle); }

  /* ===== Submit bar ===== */
  .submit-bar {
    position: sticky; bottom: 0; background: var(--bg);
    padding: 12px 0 16px; margin-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ===== Calendar ===== */
  .cal {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px;
  }
  .cal__head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal__month { font-size: 16px; font-weight: 600; }
  .cal__nav-btn {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2);
  }
  .cal__weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .cal__weekday {
    text-align: center; font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cal__grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal__day {
    position: relative; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); font-size: 14px;
    background: var(--surface-2); color: var(--text);
    transition: background 0.15s;
  }
  .cal__day.empty { background: transparent; }
  .cal__day.today { font-weight: 700; box-shadow: inset 0 0 0 2px var(--accent); }
  .cal__day.future { color: var(--text-muted); opacity: 0.5; }
  .cal__day.logged:active { background: var(--accent-soft); }
  .cal__day.logged::after {
    content: ''; position: absolute; bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
  }
  .cal__day.cycle::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid; border-width: 0 10px 10px 0;
    border-color: transparent var(--cycle) transparent transparent;
    border-top-right-radius: var(--radius-sm);
  }

  /* ===== Week list ===== */
  .week-list { display: flex; flex-direction: column; gap: 8px; }
  .week-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; background: var(--surface-2);
    border-radius: var(--radius-sm); width: 100%;
    text-align: left; font-size: 14px;
  }
  .week-item__date { font-weight: 500; }
  .week-item__meta { font-size: 12px; color: var(--text-dim); }
  .week-item.empty { color: var(--text-muted); }

  /* ===== Dashboard ===== */
  .greeting {
    padding: 24px 4px 16px;
  }
  .greeting__hi {
    font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin: 0 0 4px;
  }
  .greeting__focus {
    font-size: 14px; color: var(--text-dim); margin: 0;
    font-style: italic;
  }
  .progress-card {
    display: flex; align-items: center; justify-content: space-between;
  }
  .progress-bar {
    flex: 1; height: 8px; background: var(--surface-2);
    border-radius: 4px; overflow: hidden; margin: 0 14px;
  }
  .progress-bar__fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s ease;
  }
  .progress-value {
    font-size: 14px; font-weight: 600; color: var(--accent-text);
    min-width: 38px; text-align: right;
  }
  .metric-toggle {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .metric-toggle select {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 10px;
    font-size: 13px;
  }
  .chart {
    width: 100%; height: 160px; position: relative;
  }
  .chart svg { width: 100%; height: 100%; }
  .chart-empty {
    display: flex; align-items: center; justify-content: center;
    height: 160px; color: var(--text-muted); font-size: 13px;
  }
  .goals-list { display: flex; flex-direction: column; gap: 10px; margin: 0; padding: 0; list-style: none; }
  .goal-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm);
  }
  .streak {
    background: var(--accent-soft); color: var(--accent-text);
    padding: 10px 12px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500;
  }

  /* ===== Drawer badge ===== */
  .drawer__badge {
    display: inline-block; min-width: 18px; padding: 0 6px;
    background: var(--accent); color: white;
    border-radius: 9px; font-size: 11px; font-weight: 600;
    text-align: center; vertical-align: middle; margin-left: 4px;
  }
  .drawer__badge:empty { display: none; }

  /* ===== Hub cards (Reporting) ===== */
  .hub-card {
    display: block; width: 100%; text-align: left;
    padding: 20px 18px;
  }
  .hub-card__title {
    font-size: 17px; font-weight: 600; margin-bottom: 4px; color: var(--text);
  }
  .hub-card__desc {
    font-size: 13px; color: var(--text-dim);
  }
  .hub-card:active { background: var(--surface-2); }

  /* ===== Pills / range selector ===== */
  .pill-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px;
  }
  .pill {
    padding: 7px 14px; border: 1px solid var(--border);
    background: var(--surface); border-radius: 18px;
    font-size: 13px; color: var(--text-dim); cursor: pointer;
    transition: all 0.15s;
  }
  .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .pill:active:not(.active) { background: var(--surface-2); }

  /* ===== Data table ===== */
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    margin-top: 8px;
  }
  .data-table th, .data-table td {
    padding: 8px 10px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .data-table th {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); font-weight: 600;
    background: var(--surface-2);
  }
  .data-table tr.row-clickable { cursor: pointer; }
  .data-table tr.row-clickable:hover td { background: var(--surface-2); }
  .data-table td.out-of-range {
    color: var(--bad); font-weight: 600;
    background: var(--bad-soft);
  }
  .data-table td.in-range {
    color: var(--accent-text);
  }
  .data-table tr.expanded-row td {
    background: var(--surface-2); border-bottom: none;
    padding: 12px;
  }
  .data-table tr.expanded-row .expansion-detail {
    font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
  }
  .data-table tr.expanded-row .expansion-detail.bad { color: var(--bad); }

  /* ===== Stats grid ===== */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px 16px; margin: 14px 0;
  }
  .stats-grid .stat {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border);
  }
  .stats-grid .stat__label { color: var(--text-dim); font-size: 13px; }
  .stats-grid .stat__value { font-weight: 600; font-size: 14px; }
  @media (min-width: 600px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* ===== Chart canvas wrap ===== */
  .chart-wrap {
    position: relative; width: 100%; height: 280px;
    margin: 8px 0;
  }
  @media (min-width: 768px) {
    .chart-wrap { height: 360px; }
  }

  /* ===== Action row ===== */
  .action-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 16px;
  }
  .action-row .btn { flex: 1 1 auto; min-width: 140px; }

  /* ===== Metric picker ===== */
  .metric-picker { display: flex; flex-direction: column; gap: 6px; }
  .metric-picker__item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: var(--surface-2);
    border-radius: var(--radius-sm);
  }
  .metric-picker__item button.remove {
    color: var(--bad); font-size: 16px;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  }

  /* ===== Saved report item ===== */
  .saved-item {
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 12px 14px; margin-bottom: 8px;
  }

function ymd(d) {

    const data = JSON.parse(raw);
    state.logs = data.logs || {};

    state.cycle = { ...state.cycle, ...(data.cycle || {}) };

}
function saveLocal() {

    savedTemplates: state.savedTemplates, savedSnapshots: state.savedSnapshots,
    savedListFilters: state.savedListFilters, exportFolder: state.exportFolder,

async function initSupabase() {
  if (SUPABASE_ANON_KEY === 'PASTE_ANON_KEY_HERE' || !SUPABASE_ANON_KEY) {
    setSyncStatus('error');
    console.warn('Supabase not configured');
    return;
  }
  state.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await pullFromCloud();
}

async function pullFromCloud() {
  if (!state.supabase) return;
  try {
    setSyncStatus('syncing');
    const { data, error } = await state.supabase.from('kompass_state').select('*').eq('id', 'main').single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data && data.payload) {
      const cloud = data.payload;
      const cloudUpdated = data.updated_at ? new Date(data.updated_at).getTime() : 0;
      const localUpdated = Number(localStorage.getItem(STORAGE_KEY + '_updated') || 0);
      // last-write-wins; cloud wins if it's newer
      if (cloudUpdated >= localUpdated) {
        state.logs = cloud.logs || {};
        state.settings = { ...state.settings, ...(cloud.settings || {}) };
        state.cycle = { ...state.cycle, ...(cloud.cycle || {}) };
        state.metric = { ...state.metric, ...(cloud.metric || {}) };
        state.savedTemplates = cloud.savedTemplates || [];
        state.savedSnapshots = cloud.savedSnapshots || [];
        state.savedListFilters = cloud.savedListFilters || [];
        state.exportFolder = cloud.exportFolder || [];
        saveLocal();
      } else {
        await pushToCloud();
      }
    } else {
      await pushToCloud();
    }
    setSyncStatus('ok');
  } catch (e) {
    console.warn('Pull failed', e); setSyncStatus('error');
  }
}

let pushDebounce = null;
function queuePush() {
  saveLocal();
  localStorage.setItem(STORAGE_KEY + '_updated', String(Date.now()));
  if (!state.supabase) return;
  clearTimeout(pushDebounce);
  setSyncStatus('syncing');
  pushDebounce = setTimeout(pushToCloud, 800);
}
async function pushToCloud() {
  if (!state.supabase) return;
  try {
    const payload = {
      logs: state.logs, settings: state.settings, cycle: state.cycle, metric: state.metric,
      savedTemplates: state.savedTemplates, savedSnapshots: state.savedSnapshots,
      savedListFilters: state.savedListFilters, exportFolder: state.exportFolder,
    };
    const { error } = await state.supabase.from('kompass_state').upsert({
      id: 'main',
      payload,
      updated_at: new Date().toISOString(),
    });
    if (error) throw error;
    setSyncStatus('ok');
  } catch (e) {
    console.warn('Push failed', e); setSyncStatus('error');
  }
}

  if (!state.cycle.startedOn) return false;
  const start = parseYmd(state.cycle.startedOn).getTime();
  const d = parseYmd(date).getTime();
  // If active, every day from start to today; if ended (endedOn), only between start and end
  if (state.cycle.active) return d >= start;
  if (state.cycle.endedOn) {
    const end = parseYmd(state.cycle.endedOn).getTime();
    return d >= start && d <= end;
  }
  return false;
}

function drawChart(host, metricId, range) {
  const meta = allMetrics().find(m => m.id === metricId);
  const days = range === 'week' ? 7 : 30;
  const today = new Date();
  const series = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const date = ymd(d);
    const log = state.logs[date];
    series.push({ date, value: log ? extractMetric(log, metricId) : null });
  }
  const hasData = series.some(p => p.value !== null && p.value !== undefined && !isNaN(p.value));
  if (!hasData) {
    host.outerHTML = `<div class="chart-empty">No ${meta.label.toLowerCase()} data yet</div>`;
    return;
  }
  const w = host.clientWidth || 320, h = 160;
  const values = series.map(p => p.value).filter(v => v !== null && v !== undefined && !isNaN(v));
  const min = Math.min(...values), max = Math.max(...values);
  const range_v = max - min || 1;
  const padX = 16, padY = 20;
  const innerW = w - padX*2, innerH = h - padY*2;
  let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
  if (meta.chart === 'bar') {
    const bw = innerW / series.length * 0.7;
    const gap = innerW / series.length * 0.3;
    series.forEach((p, i) => {
      if (p.value === null || p.value === undefined || isNaN(p.value)) return;
      const x = padX + i * (innerW/series.length) + gap/2;
      const bh = ((p.value - min) / range_v) * innerH;
      const y = h - padY - bh;
      svg += `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(2,bh)}" rx="2" fill="#607d6e" opacity="0.85"/>`;
    });
  } else {
    // line chart
    const pts = series.map((p, i) => {
      if (p.value === null || p.value === undefined || isNaN(p.value)) return null;
      const x = padX + i * (innerW/(series.length-1 || 1));
      const y = h - padY - ((p.value - min) / range_v) * innerH;
      return { x, y };
    });
    let path = '';
    pts.forEach(pt => {
      if (!pt) return;
      path += (path ? ' L ' : 'M ') + pt.x + ' ' + pt.y;
    });
    svg += `<path d="${path}" stroke="#607d6e" stroke-width="2" fill="none" stroke-linejoin="round"/>`;
    pts.forEach(pt => { if (pt) svg += `<circle cx="${pt.x}" cy="${pt.y}" r="3" fill="#607d6e"/>`; });
  }
  // min/max labels
  svg += `<text x="${padX}" y="14" font-size="10" fill="#a0a0a0">${formatMetric(max, metricId)}</text>`;
  svg += `<text x="${padX}" y="${h-6}" font-size="10" fill="#a0a0a0">${formatMetric(min, metricId)}</text>`;
  svg += `</svg>`;
  host.innerHTML = svg;
}
function formatMetric(v, id) {
  if (id === 'sleep') return v.toFixed(1);
  if (id === 'weight') return v.toFixed(1);
  if (isLabMetric(id)) return String(Math.round(v * 100) / 100); // labs keep up to 2 decimals
  return Math.round(v);
}
function extractMetric(log, id) {
  const d = log.data;
  switch(id) {
    case 'sleep': return calcSleepHours(d.bedtime, d.wakeUp);
    case 'sleepQuality': return d.sleepQuality;
    case 'mood': return d.mood;
    case 'stress': return d.stress;
    case 'walk': return d.walk ? Number(d.walkMinutes || 0) : 0;
    case 'caffeine': return d.caffeine ? Number(d.caffeineCount || 0) : 0;
    case 'alcohol': return d.alcohol ? Number(d.alcoholCount || 0) : 0;
    case 'weight': return d.weight ? Number(d.weight) : null;
    case 'phone': {
      const h = Number(d.phoneHours || 0), m = Number(d.phoneMinutes || 0);
      return h*60 + m || null;
    }
    case 'food': return d.food;
  }
  // Custom numeric field: value is stored directly under its id.
  const cf = customFields().find(f => f.id === id);
  if (cf && NUMERIC_CUSTOM_TYPES.has(cf.type)) {
    const v = d[id];
    return (v === '' || v === null || v === undefined) ? null : Number(v);
  }
  return null;
}
function calcSleepHours(bed, wake) {
  if (!bed || !wake) return null;
  const [bh, bm] = bed.split(':').map(Number);
  const [wh, wm] = wake.split(':').map(Number);
  let mins = (wh*60 + wm) - (bh*60 + bm);
  if (mins < 0) mins += 24*60;
  return +(mins / 60).toFixed(2);
}
function calcStreak() {
  let n = 0;
  let d = new Date();
  // start from yesterday (today might not be complete)
  for (let i = 0; i < 365; i++) {
    const key = ymd(d);
    const log = state.logs[key];
    if (!log || missingRequired(log).length > 0) {
      if (i === 0) { d.setDate(d.getDate()-1); continue; }
      break;
    }
    n++;
    d.setDate(d.getDate()-1);
  }
  return n;
}
function goalProgress(g) {

}

function updateSectionBadges(root, log) {
  const sections = $$('.section', root);
  const missing = missingRequired(log);
  const missingKeys = new Set(missing.map(f => f.key));
  const morningKeys = ['bedtime','wakeUp','sleepQuality','medsTime','weight', ...requiredCustomKeys('morning')];
  const dayKeys = ['workday','food', ...requiredCustomKeys('day')];
  const eveningKeys = ['mood','stress', ...requiredCustomKeys('evening')];
  const counts = [
    morningKeys.filter(k => missingKeys.has(k)).length,
    0, // cycle - no required
    dayKeys.filter(k => missingKeys.has(k)).length,
    eveningKeys.filter(k => missingKeys.has(k)).length,
  ];
  let i = 0;
  sections.forEach(s => {
    const t = s.querySelector('.section__title');
    t.querySelectorAll('.section__badge').forEach(b => b.remove());
    // We need to map sections in render order - cycle may or may not exist
  });
  // Simpler: just re-find by title
  sections.forEach(s => {
    const title = s.querySelector('.section__title').firstChild.textContent.trim();
    let n = 0;
    if (title.startsWith('Morning')) n = morningKeys.filter(k => missingKeys.has(k)).length;
    else if (title.startsWith('During')) n = dayKeys.filter(k => missingKeys.has(k)).length;
    else if (title.startsWith('Evening')) n = eveningKeys.filter(k => missingKeys.has(k)).length;
    s.querySelectorAll('.section__badge').forEach(b => b.remove());
    if (n > 0) {
      const b = document.createElement('span');
      b.className = 'section__badge';
      b.textContent = `${n} left`;
      s.querySelector('.section__title').appendChild(b);
    }
  });
}

// ===== Field builders =====
function fieldShell(label, required) {
  const wrap = document.createElement('div');
  wrap.className = 'field';
  const lbl = document.createElement('div');
  lbl.className = 'field__label';
  lbl.innerHTML = `<span class="field__label-text">${label}${required ? '<span class="req">*</span>' : ''}</span>`;
  wrap.appendChild(lbl);
  return wrap;
}
function timeField(label, key, log, required, onChange, hint) {
  const wrap = fieldShell(label, required);
  const input = document.createElement('input');
  input.type = 'time'; input.className = 'time-input';
  input.value = log.data[key] || '';
  input.oninput = () => {
    log.data[key] = input.value;
    onLogChange();
    if (onChange) onChange();
  };
  wrap.appendChild(input);
  if (hint) {
    const h = document.createElement('div');
    h.style.cssText = 'font-size:12px; color: var(--text-muted); margin-top:6px;';
    h.textContent = hint;
    wrap.appendChild(h);
  }
  return wrap;
}
function numberField(label, key, log, required, step=1) {
  const wrap = fieldShell(label, required);
  const input = document.createElement('input');
  input.type = 'number'; input.className = 'number-input';
  input.step = step; input.inputMode = 'decimal';
  input.value = log.data[key] || '';
  input.oninput = () => { log.data[key] = input.value; onLogChange(); };
  wrap.appendChild(input);
  return wrap;
}
function sliderField(label, key, log, min, max, required, scaleLabels) {
  const wrap = fieldShell(label, required);
  const sw = document.createElement('div'); sw.className = 'slider-wrap';
  const row = document.createElement('div'); row.className = 'slider-row';
  const input = document.createElement('input');
  input.type = 'range'; input.className = 'slider';
  input.min = min; input.max = max; input.step = 1;
  input.value = log.data[key] || Math.round((min+max)/2);
  const val = document.createElement('div');
  val.className = 'slider-value'; val.textContent = log.data[key] || '–';
  input.oninput = () => { log.data[key] = Number(input.value); val.textContent = input.value; onLogChange(); };
  // mark "touched" on first interaction so we count it as set
  if (log.data[key] === null || log.data[key] === undefined) {
    input.addEventListener('change', () => {
      if (log.data[key] === null || log.data[key] === undefined) {
        log.data[key] = Number(input.value); val.textContent = input.value; onLogChange();
      }
    });
  }
  row.appendChild(input); row.appendChild(val);
  sw.appendChild(row);
  if (scaleLabels) {
    const sl = document.createElement('div'); sl.className = 'slider-scale';
    scaleLabels.forEach(s => { const span = document.createElement('span'); span.textContent = s; sl.appendChild(span); });
    sw.appendChild(sl);
  }
  wrap.appendChild(sw);
  return wrap;
}
function yesNoField(label, key, log, required, onChange) {
  const wrap = fieldShell(label, required);
  const grp = document.createElement('div'); grp.className = 'toggle-group';
  const yes = document.createElement('button'); yes.className = 'toggle-btn'; yes.textContent = 'Yes';
  const no = document.createElement('button'); no.className = 'toggle-btn no'; no.textContent = 'No';
  if (log.data[key] === true) yes.classList.add('active');
  if (log.data[key] === false) no.classList.add('active');
  yes.onclick = () => { log.data[key] = true; yes.classList.add('active'); no.classList.remove('active'); onLogChange(); onChange && onChange(true); };
  no.onclick = () => { log.data[key] = false; no.classList.add('active'); yes.classList.remove('active'); onLogChange(); onChange && onChange(false); };
  grp.appendChild(yes); grp.appendChild(no);
  wrap.appendChild(grp);
  return wrap;
}
function selectField(label, key, log, options) {
  const wrap = fieldShell(label, false);
  const sel = document.createElement('select');
  sel.className = 'time-input';
  sel.innerHTML = `<option value="">—</option>` + options.map(o => `<option value="${o}" ${log.data[key]===o?'selected':''}>${o}</option>`).join('');
  sel.onchange = () => { log.data[key] = sel.value; onLogChange(); };
  wrap.appendChild(sel);
  return wrap;
}
function textField(label, key, log, required = false) {
  const wrap = fieldShell(label, required);
  const t = document.createElement('textarea');
  t.className = 'text-input'; t.value = log.data[key] || '';
  t.oninput = () => { log.data[key] = t.value; onLogChange(); };
  wrap.appendChild(t);
  return wrap;
}
// Render a user-defined custom field using the matching built-in builder.
function customField(def, log) {
  switch (def.type) {
    case 'number':  return numberField(def.label, def.id, log, def.required, 'any');
    case 'yesno':   return yesNoField(def.label, def.id, log, def.required);
    case 'scale5':  return sliderField(def.label, def.id, log, 1, 5, def.required, ['1','2','3','4','5']);
    case 'scale10': return scaleField10(def.label, def.id, def.id + 'Notes', log, def.required);
    case 'text':    return textField(def.label, def.id, log, def.required);
  }
  return document.createElement('div');
}
// Append all custom fields assigned to a section into that section's body.
function appendCustomFields(body, section, log) {
  customFieldsFor(section).forEach(def => body.appendChild(customField(def, log)));
}

function counterControl(value, min, max, step, onChange) {
  const c = document.createElement('div'); c.className = 'counter';
  const dec = document.createElement('button'); dec.textContent = '–';
  const val = document.createElement('div'); val.className = 'counter__value';
  const inc = document.createElement('button'); inc.textContent = '+';
  const render = () => { val.textContent = value; };
  dec.onclick = () => { if (value - step >= min) { value -= step; render(); onChange(value); } };
  inc.onclick = () => { if (value + step <= max) { value += step; render(); onChange(value); } };
  c.appendChild(dec); c.appendChild(val); c.appendChild(inc);
  render();
  return c;
}

function workoutField(log, container) {

function redrawWorkoutSub(log, wrap) {

  types.forEach(t => {

    b.textContent = t;
    b.onclick = () => {
      log.data.workoutType = t;
      redrawWorkoutSub(log, wrap);
      onLogChange();
    };
    row.appendChild(b);
  });
  sub.appendChild(row);
  if (log.data.workoutType === 'Other') {

function trySubmit(log) {
  const missing = missingRequired(log);
  if (missing.length === 0) {
    log.submittedAt = new Date().toISOString();
    queuePush();
    toast('Today\'s log saved');
    go('home');
    return;
  }
  modal({
    title: 'Some fields are blank',
    body: 'Missing required fields:<ul>' + missing.map(f => `<li>${f.label}</li>`).join('') + '</ul>',
    actions: [
      { label: 'Go back', onClick: () => {} },
      { label: 'Submit anyway', primary: true, onClick: () => {
        log.submittedAt = new Date().toISOString();
        queuePush();
        toast('Submitted with blank fields');
        go('home');
      }},
    ],
  });
}

let calMonth = new Date(); calMonth.setDate(1);

function renderPast(root) {
  // Date picker card

  dpCard.innerHTML = `<div class="card__title">Jump to a date</div>
    <div class="field__row">

  dpCard.querySelector('#datePickerGo').onclick = () => {
    const v = dpCard.querySelector('#datePicker').value;
    if (v) { state.today = v; go('today'); state.today = ymd(new Date()); }
  };

  // Month calendar card
  const calCard = document.createElement('div'); calCard.className = 'cal';
  root.appendChild(calCard);
  drawCalendar(calCard);

  // This week card
  const wkCard = document.createElement('div'); wkCard.className = 'card';
  wkCard.innerHTML = `<div class="card__title">This Week</div>`;
  const list = document.createElement('div'); list.className = 'week-list';
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const key = ymd(d);
    const log = state.logs[key];
    const item = document.createElement('button');
    item.className = 'week-item' + (log && !log.archived && !log.deleted ? '' : ' empty');
    const lab = i === 0 ? 'Today' : i === 1 ? 'Yesterday' : shortDate(key);

      ? (log.submittedAt ? 'submitted' : `${allRequiredFields().length - missingRequired(log).length}/${allRequiredFields().length}`)
      : 'no log';
    item.innerHTML = `<span class="week-item__date">${lab}</span><span class="week-item__meta">${meta}</span>`;
    item.onclick = () => { state._editingDate = key; openPastLog(key); };

  }
  wkCard.appendChild(list);
  root.appendChild(wkCard);

  // Submit different date + Archive buttons

function drawCalendar(card) {
  card.innerHTML = '';
  const head = document.createElement('div'); head.className = 'cal__head';
  const prev = document.createElement('button'); prev.className = 'cal__nav-btn'; prev.textContent='‹';
  const next = document.createElement('button'); next.className = 'cal__nav-btn'; next.textContent='›';
  const lbl = document.createElement('div'); lbl.className = 'cal__month';
  lbl.textContent = calMonth.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  prev.onclick = () => { calMonth.setMonth(calMonth.getMonth() - 1); drawCalendar(card); };
  next.onclick = () => { calMonth.setMonth(calMonth.getMonth() + 1); drawCalendar(card); };
  head.appendChild(prev); head.appendChild(lbl); head.appendChild(next);
  card.appendChild(head);

  const wkRow = document.createElement('div'); wkRow.className = 'cal__weekdays';
  ['S','M','T','W','T','F','S'].forEach(w => { const e=document.createElement('div'); e.className='cal__weekday'; e.textContent=w; wkRow.appendChild(e); });
  card.appendChild(wkRow);

  const grid = document.createElement('div'); grid.className = 'cal__grid';
  const firstDay = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
  for (let i = 0; i < startWeekday; i++) {
    const e=document.createElement('div'); e.className='cal__day empty'; grid.appendChild(e);
  }
  const today = ymd(new Date());
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calMonth.getFullYear(), calMonth.getMonth(), d);
    const key = ymd(date);
    const log = state.logs[key];
    const isLogged = log && !log.archived && !log.deleted && (log.submittedAt || Object.values(log.data).some(v => v !== '' && v !== null && v !== undefined));
    const isCycle = isCycleDayFor(key);
    const isToday = key === today;
    const isFuture = parseYmd(key).getTime() > parseYmd(today).getTime();
    const cell = document.createElement('button');
    cell.className = 'cal__day';
    if (isLogged) cell.classList.add('logged');
    if (isCycle) cell.classList.add('cycle');
    if (isToday) cell.classList.add('today');
    if (isFuture) cell.classList.add('future');
    cell.textContent = d;
    cell.onclick = () => { if (!isFuture) openPastLog(key); };
    grid.appendChild(cell);
  }
  card.appendChild(grid);
}

function openPastLog(date) {
  // Build a view that lets user open in edit mode + offers archive
  const main = $('#main'); main.innerHTML = '';
  $('#pageTitle').textContent = prettyDate(date);
  const back = document.createElement('button');
  back.className = 'btn btn--ghost btn--small'; back.textContent = '← Back to Past Logs';
  back.style.marginBottom = '12px';
  back.onclick = () => go('past');
  main.appendChild(back);
  const log = getLog(date);
  state._editingDate = date;
  // Show editable today's-log style
  renderTodayBody(main, date);
  // Archive / Restore / Delete buttons
  const ctrl = document.createElement('div');
  ctrl.style.cssText = 'display:flex; gap:10px; margin-top: 16px;';
  if (log.archived) {
    const restore = document.createElement('button');
    restore.className = 'btn btn--secondary'; restore.style.flex='1'; restore.textContent = 'Restore from archive';
    restore.onclick = () => { log.archived = false; queuePush(); toast('Restored'); openPastLog(date); };
    ctrl.appendChild(restore);
  } else {
    const archive = document.createElement('button');
    archive.className = 'btn btn--secondary'; archive.style.flex='1'; archive.textContent = 'Archive this log';
    archive.onclick = () => {
      modal({
        title: 'Archive this log?',
        body: 'It\'ll be removed from all views but recoverable from the Archive section.',
        actions: [
          { label: 'Cancel' },
          { label: 'Archive', primary: true, onClick: () => { log.archived = true; queuePush(); toast('Archived'); go('past'); } },
        ],
      });
    };
    ctrl.appendChild(archive);
  }
  // Add to Export Folder
  const expBtn = document.createElement('button');
  expBtn.className = 'btn btn--secondary'; expBtn.style.flex = '1'; expBtn.textContent = '+ Export Folder';
  expBtn.onclick = () => {
    state.exportFolder.push({
      id: 'ef-' + Date.now(), kind: 'pastlog',
      title: `Full log: ${prettyDate(date)}`,
      date, note: '',
    });
    queuePush(); updateExportBadge();
    toast(`Added to Export Folder (${state.exportFolder.length})`);
  };
  ctrl.appendChild(expBtn);
  main.appendChild(ctrl);
}

function openSubmitDifferentDateModal() {
  modal({
    title: 'Pick a date',
    body: `<input type="date" class="time-input" id="modalDate" style="width:100%;" value="${state.today}"/>`,
    actions: [
      { label: 'Cancel' },
      { label: 'Open log', primary: true, onClick: () => {
        const v = document.querySelector('#modalDate').value;
        if (v) openPastLog(v);
      }},
    ],

function openArchiveView() {
  const main = $('#main'); main.innerHTML = '';
  $('#pageTitle').textContent = 'Archived Logs';
  const back = document.createElement('button');
  back.className='btn btn--ghost btn--small'; back.textContent='← Back to Past Logs';
  back.style.marginBottom = '12px';
  back.onclick = () => go('past');
  main.appendChild(back);
  const archived = Object.values(state.logs).filter(l => l.archived).sort((a,b) => b.date.localeCompare(a.date));
  if (archived.length === 0) {
    main.appendChild(elFromHtml(`<div class="placeholder"><h3>No archived logs</h3><p>Archive logs from any past log view.</p></div>`));
    return;
  }
  const list = document.createElement('div'); list.className='week-list';
  archived.forEach(log => {
    const item = document.createElement('div');
    item.className = 'week-item';
    item.innerHTML = `<span class="week-item__date">${shortDate(log.date)}</span>
      <span style="display:flex; gap:8px;">
        <button class="btn btn--small btn--ghost" data-act="open">Open</button>
        <button class="btn btn--small btn--ghost" data-act="delete" style="color:var(--bad);">Delete</button>
      </span>`;
    item.querySelector('[data-act=open]').onclick = () => openPastLog(log.date);
    item.querySelector('[data-act=delete]').onclick = () => {
      modal({
        title: 'Permanently delete?',
        body: 'This cannot be undone.',
        actions: [
          { label: 'Cancel' },
          { label: 'Delete', primary: true, onClick: () => { delete state.logs[log.date]; queuePush(); toast('Deleted'); openArchiveView(); } },
        ],
      });
    };
    list.appendChild(item);
  });
  main.appendChild(list);
}

function elFromHtml(html) {
  const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild;
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// User-defined custom fields: list, add, edit, delete.
function renderCustomFieldsCard(root) {
  const card = document.createElement('div'); card.className = 'card';
  card.innerHTML = `<div class="card__title">My custom fields</div>
    <p style="font-size:12px; color:var(--text-muted); margin:0 0 12px;">Add your own things to track. They appear in your daily log and — for number and scale fields — in Reporting &amp; Patterns.</p>`;

  const list = document.createElement('div');
  const formHost = document.createElement('div');
  const typeLabel = (t) => (CUSTOM_TYPES.find(x => x.type === t) || {}).label || t;
  const sectionLabel = (s) => (CUSTOM_SECTIONS.find(x => x.id === s) || {}).label || s;

  function refresh() {
    list.innerHTML = '';
    const fields = customFields();
    if (fields.length === 0) {
      const empty = document.createElement('p');
      empty.style.cssText = 'color:var(--text-muted); font-size:13px; margin:0;';
      empty.textContent = 'No custom fields yet.';
      list.appendChild(empty);
    }
    fields.forEach((f) => {
      const row = document.createElement('div'); row.className = 'goal-item';
      const meta = `${typeLabel(f.type)} · ${sectionLabel(f.section)}${f.required ? ' · Required' : ''}`;
      const info = document.createElement('div');
      info.innerHTML = `<div>${escapeHtml(f.label)}</div><div style="font-size:12px; color:var(--text-muted);">${escapeHtml(meta)}</div>`;
      const btns = document.createElement('div'); btns.style.cssText = 'display:flex; gap:6px;';
      const edit = document.createElement('button'); edit.className='btn btn--small btn--ghost'; edit.textContent='Edit';
      edit.onclick = () => openForm(f);
      const del = document.createElement('button'); del.className='btn btn--small btn--ghost'; del.textContent='Delete'; del.style.color='var(--bad)';
      del.onclick = () => {
        if (!confirm(`Delete "${f.label}"? Past entries keep their data, but this field is removed from your log going forward.`)) return;
        const idx = state.settings.customFields.findIndex(x => x.id === f.id);
        if (idx >= 0) state.settings.customFields.splice(idx, 1);
        queuePush(); refresh();
      };
      btns.appendChild(edit); btns.appendChild(del);
      row.appendChild(info); row.appendChild(btns);
      list.appendChild(row);
    });
  }

  function openForm(existing) {
    formHost.innerHTML = '';
    const f = existing || { label: '', type: 'number', section: 'day', required: false };
    const box = document.createElement('div');
    box.style.cssText = 'margin-top:12px; padding:14px; border:1px solid var(--border, #e3e0d8); border-radius:10px;';

    const labelInput = document.createElement('input'); labelInput.type='text'; labelInput.className='text-input';
    labelInput.placeholder = 'Field name (e.g. Water, Headache, Steps)'; labelInput.value = f.label || '';

    const mkSelect = (options, selected) => {
      const s = document.createElement('select'); s.className='time-input'; s.style.cssText='width:100%; margin-top:8px;';
      options.forEach(o => { const op=document.createElement('option'); op.value=o.value; op.textContent=o.text; if (o.value===selected) op.selected=true; s.appendChild(op); });
      return s;
    };
    const typeSel = mkSelect(CUSTOM_TYPES.map(t => ({value:t.type, text:t.label})), f.type);
    const secSel = mkSelect(CUSTOM_SECTIONS.map(s => ({value:s.id, text:s.label})), f.section);

    const reqWrap = document.createElement('label'); reqWrap.style.cssText='display:flex; align-items:center; gap:8px; margin-top:12px; font-size:14px; cursor:pointer;';
    const reqCb = document.createElement('input'); reqCb.type='checkbox'; reqCb.checked=!!f.required;
    reqWrap.appendChild(reqCb); reqWrap.appendChild(document.createTextNode('Required (counts toward daily completeness)'));

    const chartNote = document.createElement('p'); chartNote.style.cssText='font-size:12px; color:var(--text-muted); margin:10px 0 0;';
    const updateNote = () => {
      const t = CUSTOM_TYPES.find(x => x.type === typeSel.value);
      chartNote.textContent = t && t.numeric
        ? '📈 This field will be available to chart in Reporting & Patterns.'
        : 'This field is tracked in your log only (not charted).';
    };
    typeSel.onchange = updateNote; updateNote();

    const btnRow = document.createElement('div'); btnRow.style.cssText='display:flex; gap:8px; margin-top:14px;';
    const save = document.createElement('button'); save.className='btn btn--small'; save.textContent = existing ? 'Save changes' : 'Add field';
    const cancel = document.createElement('button'); cancel.className='btn btn--small btn--ghost'; cancel.textContent='Cancel';
    cancel.onclick = () => { formHost.innerHTML=''; };
    save.onclick = () => {
      const label = labelInput.value.trim();
      if (!label) { labelInput.focus(); return; }
      const type = typeSel.value;
      const tmeta = CUSTOM_TYPES.find(x => x.type === type) || {};
      const def = {
        id: existing ? existing.id : 'cf_' + Date.now(),
        label, type, section: secSel.value, required: reqCb.checked,
        chart: tmeta.chart || 'line',
      };
      if (!state.settings.customFields) state.settings.customFields = [];
      if (existing) {
        const idx = state.settings.customFields.findIndex(x => x.id === existing.id);
        if (idx >= 0) state.settings.customFields[idx] = def;
      } else {
        state.settings.customFields.push(def);
      }
      queuePush(); formHost.innerHTML=''; refresh();
      toast(existing ? 'Field updated' : 'Field added');
    };
    btnRow.appendChild(save); btnRow.appendChild(cancel);

    box.appendChild(labelInput); box.appendChild(typeSel); box.appendChild(secSel);
    box.appendChild(reqWrap); box.appendChild(chartNote); box.appendChild(btnRow);
    formHost.appendChild(box);
    labelInput.focus();
  }

  refresh();
  card.appendChild(list);
  const addBtn = document.createElement('button'); addBtn.className='btn btn--small'; addBtn.textContent='+ Add a field'; addBtn.style.marginTop='12px';
  addBtn.onclick = () => openForm(null);
  card.appendChild(addBtn);
  card.appendChild(formHost);
  root.appendChild(card);
}

// Medication schedule + change history. Editing meds auto-logs dated events
// that show up as flags on your charts.
function renderMedScheduleCard(root) {
  const card = document.createElement('div'); card.className = 'card';
  card.innerHTML = `<div class="card__title">Medication schedule &amp; history</div>
    <p style="font-size:12px; color:var(--text-muted); margin:0 0 12px;">Add or update your meds here. Every change is logged with a date and shows up as a 💊 flag on your charts — so you can see exactly when a dose change lines up with a lab or symptom shift.</p>`;

  const list = document.createElement('div');
  const histWrap = document.createElement('div');
  const formHost = document.createElement('div');

  function refresh() {
    // current meds
    list.innerHTML = `<div style="font-size:12px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em; margin:0 0 6px;">Current medications</div>`;
    const meds = medications();
    if (!meds.length) {
      const empty = document.createElement('p'); empty.style.cssText = 'color:var(--text-muted); font-size:13px; margin:0 0 8px;';
      empty.textContent = 'No medications added yet.';
      list.appendChild(empty);
    }
    meds.forEach(med => {
      const row = document.createElement('div'); row.className = 'goal-item';
      const info = document.createElement('div');
      info.innerHTML = `<div>${escapeHtml(med.name)}</div><div style="font-size:12px; color:var(--text-muted);">${med.dose ? escapeHtml(String(med.dose)) + (med.unit || '') : 'no dose set'}</div>`;
      const btns = document.createElement('div'); btns.style.cssText = 'display:flex; gap:6px;';
      const edit = document.createElement('button'); edit.className = 'btn btn--small btn--ghost'; edit.textContent = 'Edit'; edit.onclick = () => openForm(med);
      const del = document.createElement('button'); del.className = 'btn btn--small btn--ghost'; del.textContent = 'Delete'; del.style.color = 'var(--bad)';
      del.onclick = () => {
        if (!confirm(`Remove "${med.name}" from your current meds?`)) return;
        const i = medications().findIndex(x => x.id === med.id);
        if (i >= 0) medications().splice(i, 1);
        if (confirm(`Log "Stopped ${med.name}" on the timeline (shows as a flag on charts)?`)) {
          medEvents().push({ id: 'me_' + Date.now(), date: state.today, type: 'stop', medName: med.name, dose: '', unit: med.unit || '', note: '' });
        }
        queuePush(); refresh();
      };
      btns.appendChild(edit); btns.appendChild(del);
      row.appendChild(info); row.appendChild(btns);
      list.appendChild(row);
    });

    // change history
    histWrap.innerHTML = `<div style="font-size:12px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em; margin:16px 0 6px;">Change history</div>`;
    const evs = medEvents().slice().sort((a, b) => b.date.localeCompare(a.date));
    if (!evs.length) {
      const empty = document.createElement('p'); empty.style.cssText = 'color:var(--text-muted); font-size:13px; margin:0;';
      empty.textContent = 'No changes logged yet.';
      histWrap.appendChild(empty);
    }
    evs.forEach(e => {
      const row = document.createElement('div'); row.className = 'goal-item';
      const info = document.createElement('div');
      info.innerHTML = `<div style="font-size:13px;">💊 ${escapeHtml(medEventText(e))}</div><div style="font-size:12px; color:var(--text-muted);">${shortDate(e.date)}${e.note ? ' · ' + escapeHtml(e.note) : ''}</div>`;
      const del = document.createElement('button'); del.className = 'btn btn--small btn--ghost'; del.textContent = 'Delete'; del.style.color = 'var(--bad)';
      del.onclick = () => {
        const i = medEvents().findIndex(x => x.id === e.id);
        if (i >= 0) medEvents().splice(i, 1);
        queuePush(); refresh();
      };
      row.appendChild(info); row.appendChild(del);
      histWrap.appendChild(row);
    });
  }

  function openForm(existing) {
    formHost.innerHTML = '';
    const med = existing || { name: '', dose: '', unit: 'mcg' };
    const box = document.createElement('div'); box.style.cssText = 'margin-top:12px; padding:14px; border:1px solid var(--border,#e3e0d8); border-radius:10px;';
    const name = document.createElement('input'); name.type = 'text'; name.className = 'text-input'; name.placeholder = 'Medication name (e.g. Levothyroxine)'; name.value = med.name || '';
    const doseRow = document.createElement('div'); doseRow.style.cssText = 'display:flex; gap:8px; align-items:center; margin-top:8px;';
    const dose = document.createElement('input'); dose.type = 'number'; dose.step = 'any'; dose.className = 'number-input'; dose.style.width = '110px'; dose.placeholder = 'dose'; dose.value = med.dose || '';
    const unit = document.createElement('select'); unit.className = 'time-input';
    ['mcg', 'mg', 'IU', 'mL', ''].forEach(u => { const o = document.createElement('option'); o.value = u; o.textContent = u || '(none)'; if ((med.unit || 'mcg') === u) o.selected = true; unit.appendChild(o); });
    doseRow.appendChild(dose); doseRow.appendChild(unit);
    const dateWrap = document.createElement('div'); dateWrap.style.marginTop = '10px';
    dateWrap.innerHTML = `<label style="font-size:13px; color:var(--text-dim); display:block; margin-bottom:4px;">Effective date ${existing ? '(of this change)' : '(when you started it)'}</label>`;
    const dateInput = document.createElement('input'); dateInput.type = 'date'; dateInput.className = 'time-input'; dateInput.style.width = '100%'; dateInput.value = state.today;
    dateWrap.appendChild(dateInput);
    const logWrap = document.createElement('label'); logWrap.style.cssText = 'display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13px; cursor:pointer;';
    const logCb = document.createElement('input'); logCb.type = 'checkbox'; logCb.checked = true;
    logWrap.appendChild(logCb); logWrap.appendChild(document.createTextNode(existing ? 'Log this as a change on my charts' : 'Mark the start on my charts'));

    const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex; gap:8px; margin-top:14px;';
    const save = document.createElement('button'); save.className = 'btn btn--small'; save.textContent = existing ? 'Save changes' : 'Add medication';
    const cancel = document.createElement('button'); cancel.className = 'btn btn--small btn--ghost'; cancel.textContent = 'Cancel';
    cancel.onclick = () => { formHost.innerHTML = ''; };
    save.onclick = () => {
      const nm = name.value.trim(); if (!nm) { name.focus(); return; }
      const newDose = dose.value.trim() === '' ? '' : Number(dose.value);
      const newUnit = unit.value;
      if (existing) {
        existing.name = nm; existing.dose = newDose; existing.unit = newUnit;
        if (logCb.checked) {
          medEvents().push({ id: 'me_' + Date.now(), date: dateInput.value, type: 'dose', medName: nm, dose: newDose, unit: newUnit, note: '' });
        }
      } else {
        const id = 'med_' + Date.now();
        medications().push({ id, name: nm, dose: newDose, unit: newUnit });
        if (logCb.checked) {
          medEvents().push({ id: 'me_' + Date.now(), date: dateInput.value, type: 'start', medName: nm, dose: newDose, unit: newUnit, note: '' });
        }
      }
      queuePush(); formHost.innerHTML = ''; refresh();
      toast(existing ? 'Medication updated' : 'Medication added');
    };
    btnRow.appendChild(save); btnRow.appendChild(cancel);
    box.appendChild(name); box.appendChild(doseRow); box.appendChild(dateWrap); box.appendChild(logWrap); box.appendChild(btnRow);
    formHost.appendChild(box); name.focus();
  }

  refresh();
  card.appendChild(list);
  const addBtn = document.createElement('button'); addBtn.className = 'btn btn--small'; addBtn.textContent = '+ Add medication'; addBtn.style.marginTop = '12px';
  addBtn.onclick = () => openForm(null);
  card.appendChild(addBtn);
  card.appendChild(histWrap);
  card.appendChild(formHost);
  root.appendChild(card);
}

// =============== LABS & BLOODWORK ===============
const LABS_BUCKET = 'labs';

async function uploadLabFile(file) {
  if (!state.supabase) throw new Error('no-storage');
  const safe = file.name.replace(/[^\w.\-]+/g, '_').slice(-80);
  const path = `${Date.now()}-${Math.floor(Math.random() * 1e6)}-${safe}`;
  const { error } = await state.supabase.storage.from(LABS_BUCKET).upload(path, file, { upsert: false });
  if (error) throw error;
  return { name: file.name, path, type: file.type || '', size: file.size || 0 };
}
async function openLabFile(f) {
  if (!state.supabase) { toast('File storage not set up yet'); return; }
  try {
    const { data, error } = await state.supabase.storage.from(LABS_BUCKET).createSignedUrl(f.path, 3600);
    if (error) throw error;
    window.open(data.signedUrl, '_blank');
  } catch (e) { console.warn(e); toast('Could not open file'); }
}

function renderLabs(root) {
  root.innerHTML = '';
  const intro = document.createElement('div'); intro.className = 'card';
  intro.innerHTML = `<div class="card__title">Labs &amp; Bloodwork</div>
    <p style="font-size:13px; color:var(--text-dim); margin:0;">Upload your lab reports and log the key numbers. Your values trend over time in Reporting — with a shaded normal-range band and your medication changes marked right on the chart.</p>`;
  root.appendChild(intro);

  const formHost = document.createElement('div');
  const listCard = document.createElement('div'); listCard.className = 'card';

  function refreshList() {
    listCard.innerHTML = `<div class="card__title">Lab history</div>`;
    const recs = labRecords().slice().sort((a, b) => b.date.localeCompare(a.date));
    if (recs.length === 0) {
      const empty = document.createElement('p'); empty.style.cssText = 'color:var(--text-muted); font-size:13px; margin:0;';
      empty.textContent = 'No lab results yet. Add your first one above.';
      listCard.appendChild(empty);
      return;
    }
    recs.forEach(rec => {
      const item = document.createElement('div'); item.className = 'goal-item'; item.style.cssText = 'align-items:flex-start; flex-direction:column; gap:8px;';
      const valCount = Object.keys(rec.values || {}).filter(k => rec.values[k] !== '' && rec.values[k] != null).length;
      const head = document.createElement('div'); head.style.cssText = 'display:flex; justify-content:space-between; width:100%; align-items:center;';
      head.innerHTML = `<div><div style="font-weight:600;">${prettyDate(rec.date)}</div>
        <div style="font-size:12px; color:var(--text-muted);">${valCount} value${valCount === 1 ? '' : 's'}${(rec.files && rec.files.length) ? ' · ' + rec.files.length + ' file' + (rec.files.length === 1 ? '' : 's') : ''}</div></div>`;
      const btns = document.createElement('div'); btns.style.cssText = 'display:flex; gap:6px;';
      const edit = document.createElement('button'); edit.className = 'btn btn--small btn--ghost'; edit.textContent = 'Edit';
      edit.onclick = () => { openForm(rec); window.scrollTo(0, 0); };
      const del = document.createElement('button'); del.className = 'btn btn--small btn--ghost'; del.textContent = 'Delete'; del.style.color = 'var(--bad)';
      del.onclick = () => {
        if (!confirm(`Delete the lab result from ${prettyDate(rec.date)}? This can't be undone.`)) return;
        const i = labRecords().findIndex(r => r.id === rec.id);
        if (i >= 0) labRecords().splice(i, 1);
        queuePush(); refreshList();
      };
      btns.appendChild(edit); btns.appendChild(del);
      head.appendChild(btns);
      item.appendChild(head);
      // value chips
      const vals = labMarkers().filter(m => rec.values && rec.values[m.id] !== '' && rec.values[m.id] != null);
      if (vals.length) {
        const chips = document.createElement('div'); chips.style.cssText = 'display:flex; flex-wrap:wrap; gap:6px;';
        vals.forEach(m => {
          const v = Number(rec.values[m.id]);
          const out = isOutOfRange(v, m.id);
          const chip = document.createElement('span');

function rangeHint(m) {
  const lo = (m.low === '' || m.low == null) ? null : m.low;
  const hi = (m.high === '' || m.high == null) ? null : m.high;
  if (lo != null && hi != null) return `${lo}–${hi}`;
  if (hi != null) return `< ${hi}`;
  if (lo != null) return `> ${lo}`;
  return '';
}

// =============== REPORTING ===============

const RANGE_PRESETS = [
  { id: 'today', label: 'Today', days: 1 },
  { id: '7d', label: '7d', days: 7 },
  { id: '30d', label: '30d', days: 30 },
  { id: '90d', label: '90d', days: 90 },
  { id: '1yr', label: '1yr', days: 365 },
  { id: 'all', label: 'All', days: null },
  { id: 'custom', label: 'Custom', days: null },
];

function rangeDates(rangeId, customFrom, customTo) {
  const today = new Date(); today.setHours(0,0,0,0);
  if (rangeId === 'custom' && customFrom && customTo) {
    return { from: parseYmd(customFrom), to: parseYmd(customTo) };
  }
  if (rangeId === 'all') {
    const dates = Object.keys(state.logs).concat(labRecords().map(r => r.date)).sort();
    if (dates.length === 0) return { from: today, to: today };
    return { from: parseYmd(dates[0]), to: today };
  }
  const preset = RANGE_PRESETS.find(p => p.id === rangeId) || RANGE_PRESETS[1];
  const from = new Date(today); from.setDate(from.getDate() - (preset.days - 1));
  return { from, to: today };
}

function getSeries(metricId, from, to) {
  // Returns array of { date: 'YYYY-MM-DD', value: number|null }
  const out = [];
  // Lab markers live in their own records (sparse), not in daily logs.
  if (isLabMetric(metricId)) {
    const byDate = {};
    labSeriesFor(metricId).forEach(p => { byDate[p.date] = p.value; });
    const d = new Date(from);
    while (d <= to) { const key = ymd(d); out.push({ date: key, value: key in byDate ? byDate[key] : null }); d.setDate(d.getDate() + 1); }
    return out;
  }
  const d = new Date(from);
  while (d <= to) {
    const key = ymd(d);
    const log = state.logs[key];
    const val = log && !log.archived && !log.deleted ? extractMetric(log, metricId) : null;
    out.push({ date: key, value: val });
    d.setDate(d.getDate() + 1);
  }
  return out;
}

function metricMeta(id) {
  const m = allMetrics().find(m => m.id === id);
  return m || { id, label: id, chart: 'line' };
}

function isYNMetric(id) {
  // metrics whose extract returns 0 or value (1 if happened) treated as on/off
  return ['walk','caffeine','alcohol'].indexOf(id) === -1 && // these are counts but stored from y/n
         ['washHair','proteinShake','collagen','workday','workout','k18','palpitations','tv','cbd'].indexOf(id) > -1;
}

function computeStats(series, metricId) {
  const values = series.filter(p => p.value !== null && p.value !== undefined && !isNaN(p.value)).map(p => p.value);
  const logged = series.filter(p => p.value !== null && p.value !== undefined && !isNaN(p.value)).length;
  if (values.length === 0) {
    return { avg: '—', median: '—', best: '—', worst: '—', bestDate: '', worstDate: '', inRange: '—', outOfRange: '—', logged: `0 / ${series.length} days` };
  }
  const avg = values.reduce((a,b)=>a+b,0) / values.length;
  const sorted = [...values].sort((a,b)=>a-b);
  const median = sorted.length % 2 ? sorted[(sorted.length-1)/2]
    : (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2;
  // best = max for most things, but for stress/palpitations lower is "better"
  // For now: best = max, worst = min (caller can interpret)
  let bestVal = -Infinity, worstVal = Infinity, bestIdx = 0, worstIdx = 0;
  series.forEach((p, i) => {
    if (p.value === null || p.value === undefined || isNaN(p.value)) return;
    if (p.value > bestVal) { bestVal = p.value; bestIdx = i; }
    if (p.value < worstVal) { worstVal = p.value; worstIdx = i; }
  });
  // Range checking
  const range = rangeForMetric(metricId);
  let inR = '—', outR = '—';
  if (range && (range.min !== '' || range.max !== '')) {
    const mn = range.min !== '' ? Number(range.min) : -Infinity;
    const mx = range.max !== '' ? Number(range.max) : Infinity;
    let ic = 0, oc = 0;
    values.forEach(v => { if (v >= mn && v <= mx) ic++; else oc++; });
    inR = `${ic} / ${logged} days`;
    outR = `${oc} / ${logged} days`;
  }
  const fmt = v => formatMetric(v, metricId);
  return {
    avg: fmt(avg), median: fmt(median),
    best: fmt(bestVal), bestDate: shortDate(series[bestIdx].date),
    worst: fmt(worstVal), worstDate: shortDate(series[worstIdx].date),
    inRange: inR, outOfRange: outR,
    logged: `${logged} / ${series.length} days`,
  };
}

function isOutOfRange(value, metricId) {
  if (value === null || value === undefined || isNaN(value)) return false;
  const range = rangeForMetric(metricId);
  if (!range || (range.min === '' && range.max === '')) return false;
  const mn = range.min !== '' ? Number(range.min) : -Infinity;
  const mx = range.max !== '' ? Number(range.max) : Infinity;
  return value < mn || value > mx;
}

// ============= CHART RENDERING =============
let _activeCharts = [];
function destroyCharts() {
  _activeCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  _activeCharts = [];
}

function drawChartJS(canvas, metricIds, days, seriesList, chartType) {
  destroyCharts();
  const fullDates = seriesList[0].map(p => p.date);          // YYYY-MM-DD
  const labels = fullDates.map(d => d.slice(5));             // MM-DD
  const colors = ['#607d6e', '#b87291', '#c48b5f', '#7B9DA8'];
  const datasets = [];
  metricIds.forEach((mid, idx) => {
    const meta = metricMeta(mid);
    const series = seriesList[idx];
    const ynMetric = isYNMetric(mid);
    const lab = isLabMetric(mid);
    if (ynMetric && chartType !== 'bar') {
      // Show as scatter on top axis or fill regions — for simplicity render as bar
      datasets.push({
        type: 'bar', label: meta.label, yAxisID: idx === 0 ? 'y' : 'y1',
        data: series.map(p => p.value),
        backgroundColor: colors[idx] + '44',
        borderColor: colors[idx],
        borderWidth: 1, barPercentage: 1.0, categoryPercentage: 1.0,
      });
    } else {
      datasets.push({
        type: chartType === 'bar' ? 'bar' : (chartType === 'scatter' ? 'scatter' : 'line'),
        label: meta.label, yAxisID: idx === 0 ? 'y' : 'y1',
        data: chartType === 'scatter' ? series.map((p, i) => ({ x: seriesList[0][i].value, y: p.value })) : series.map(p => p.value),
        borderColor: colors[idx], backgroundColor: chartType === 'area' ? colors[idx] + '33' : colors[idx],
        borderWidth: 2, pointRadius: 3, fill: chartType === 'area', tension: 0.25,
        spanGaps: lab,   // lab values are sparse — connect across the empty days
      });
    }
  });
  const scales = { y: { beginAtZero: false, grid: { color: '#e4dfd5' } } };
  if (metricIds.length > 1) scales.y1 = { position: 'right', beginAtZero: false, grid: { drawOnChartArea: false } };

  // Overlay: healthy-zone band for the primary metric + medication-change flags.
  const band = rangeForMetric(metricIds[0]);
  const bandVals = band ? {
    min: (band.min !== '' && band.min != null) ? Number(band.min) : null,
    max: (band.max !== '' && band.max != null) ? Number(band.max) : null,
  } : null;
  const annoEvents = fullDates.length ? medEventsInRange(fullDates[0], fullDates[fullDates.length - 1]).map(e => {
    let i = fullDates.indexOf(e.date);
    if (i < 0) i = fullDates.findIndex(d => d >= e.date);   // snap to the next logged day
    return i >= 0 ? { idx: i, text: medEventText(e) } : null;
  }).filter(Boolean) : [];

  const overlayPlugin = {
    id: 'kompassOverlay',
    beforeDatasetsDraw(chart) {
      if (!bandVals || (bandVals.min == null && bandVals.max == null)) return;
      const { ctx, chartArea, scales: sc } = chart;
      const y = sc.y; if (!y) return;
      let top = bandVals.max != null ? y.getPixelForValue(bandVals.max) : chartArea.top;
      let bot = bandVals.min != null ? y.getPixelForValue(bandVals.min) : chartArea.bottom;
      top = Math.max(top, chartArea.top); bot = Math.min(bot, chartArea.bottom);
      if (bot <= top) return;
      ctx.save();
      ctx.fillStyle = 'rgba(96,125,110,0.10)';
      ctx.fillRect(chartArea.left, top, chartArea.right - chartArea.left, bot - top);
      ctx.strokeStyle = 'rgba(96,125,110,0.35)'; ctx.setLineDash([4, 3]); ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(chartArea.left, top); ctx.lineTo(chartArea.right, top);
      ctx.moveTo(chartArea.left, bot); ctx.lineTo(chartArea.right, bot);
      ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(80,105,90,0.85)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('Normal range', chartArea.left + 4, top + 11);
      ctx.restore();
    },
    afterDatasetsDraw(chart) {
      if (!annoEvents.length) return;
      const { ctx, chartArea, scales: sc } = chart;
      const x = sc.x; if (!x) return;
      ctx.save();
      annoEvents.forEach(a => {
        const px = x.getPixelForValue(a.idx);
        if (px < chartArea.left - 1 || px > chartArea.right + 1) return;
        ctx.strokeStyle = 'rgba(184,114,145,0.75)'; ctx.setLineDash([5, 3]); ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(px, chartArea.top); ctx.lineTo(px, chartArea.bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.save();
        ctx.translate(px + 3, chartArea.top + 4);
        ctx.rotate(Math.PI / 2);
        ctx.fillStyle = '#9a5570'; ctx.font = '9px sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText('💊 ' + a.text, 0, 0);
        ctx.restore();
      });
      ctx.restore();
    },
  };

  const chart = new Chart(canvas, {
    type: datasets[0]?.type || 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: metricIds.length > 1, labels: { font: { size: 11 } } } },
      scales,
    },
    plugins: [overlayPlugin],
  });
  _activeCharts.push(chart);
  return chart;
}

  } else {
    chartWrap.innerHTML = `<div class="chart-empty" style="height:100%;">Pick metrics above to see a preview</div>`;
  }
}

function renderChartBuilderSwap(main) { renderChartBuilder(main); }

function autoChartName(s) {
  const m = (s.metrics || []).map(id => metricMeta(id).label).join(' + ');
  const r = s.range === 'custom' ? `${s.customFrom} → ${s.customTo}` : `last ${s.range}`;
  return `${m || 'Untitled'} (${r})`;
}

function openSaveAsModal(s) {
  modal({
    title: 'Save as…',
    body: `
      <p style="margin:0 0 10px;">Choose save type:</p>
      <p style="font-size:12px; color:var(--text-dim);"><strong>Template</strong> = config only (always pulls fresh data)<br/>
      <strong>Snapshot</strong> = freezes current data so it never changes</p>
      <label style="display:block; margin-top:14px; font-size:13px; color:var(--text-dim);">Name:</label>
      <input type="text" id="saveAsName" class="text-input" value="${escapeHtml(s.title || autoChartName(s))}"/>
    `,
    actions: [
      { label: 'Cancel' },
      { label: 'Save Template', primary: true, onClick: () => saveTemplate(s, document.querySelector('#saveAsName').value) },
      { label: 'Save Snapshot', primary: true, onClick: () => saveSnapshot(s, document.querySelector('#saveAsName').value) },
    ],
  });
}

function saveTemplate(s, name) {
  state.savedTemplates.push({
    id: 'tpl-' + Date.now(), name: name || autoChartName(s),
    config: JSON.parse(JSON.stringify(s)),
  });
  queuePush(); toast('Template saved');
}

function saveSnapshot(s, name) {
  const { from, to } = rangeDates(s.range, s.customFrom, s.customTo);
  const frozen = {};
  s.metrics.forEach(mid => { frozen[mid] = getSeries(mid, from, to); });
  state.savedSnapshots.push({
    id: 'snap-' + Date.now(), name: name || autoChartName(s),
    savedAt: new Date().toISOString(),
    config: JSON.parse(JSON.stringify(s)),
    frozenData: frozen,
  });
  queuePush(); toast('Snapshot saved');
}

function openAnnotationModal(s) {
  modal({
    title: 'Add annotation',
    body: `
      <label style="display:block; font-size:13px; color:var(--text-dim);">Date:</label>
      <input type="date" id="anDate" class="time-input" value="${ymd(new Date())}" style="width:100%; margin-bottom:10px;"/>
      <label style="display:block; font-size:13px; color:var(--text-dim);">Text:</label>
      <textarea id="anText" class="text-input" placeholder="e.g. started new med"></textarea>
    `,
    actions: [
      { label: 'Cancel' },
      { label: 'Add', primary: true, onClick: () => {
        const dt = document.querySelector('#anDate').value;
        const tx = document.querySelector('#anText').value;
        if (!dt || !tx) return;
        s.advanced.annotations = s.advanced.annotations || [];
        s.advanced.annotations.push({ date: dt, text: tx });
        renderChartBuilderSwap($('#main'));
      }},
    ],
  });
}
